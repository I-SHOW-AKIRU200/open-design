name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git credentials to prevent permissions blocks
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Force push the main workspace branch directly to Hugging Face
          git push --force https://AKIRU0007:$HF_TOKEN@huggingface.co/spaces/AKIRU0007/open-design-backend main
          
